<!DOCTYPE html>
<html lang="sq">
<head>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; }
        #matrix { display: block; background: transparent; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    canvas.height = window.innerHeight;
    canvas.width = 200; 

    const fontSize = 20;
    const columns = 6;
    const drops = Array(columns).fill(0);
    
    // Kjo shërben për të kontrolluar ritmin e rënies
    let frameCount = 0;
    
    const djs = [
        "DJ QUEEN", "DJ ANONYMOUS", "DJ TRIMRESHA", 
        "DJ VITO", "DJ LANDI", "DJ EMANUEL", "DJ BESI"
    ];

    const activeNames = Array(columns).fill(0).map(() => Math.floor(Math.random() * djs.length));

    function draw() {
        // Sfondi transparent
        ctx.fillStyle = 'rgba(0, 0, 0, 0.02)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold ' + fontSize + 'px monospace';

        // Përdorim frameCount për të kontrolluar shpejtësinë
        // Shkronjat ndryshojnë vetëm çdo 3 frame (ngadalësim i kontrolluar)
        frameCount++;
        if (frameCount % 3 !== 0) return;

        for (let i = 0; i < drops.length; i++) {
            const name = djs[activeNames[i]];
            const char = name.charAt(drops[i] % name.length);
            
            ctx.fillText(char, i * 30 + 5, (drops[i] + 1) * fontSize);

            if ((drops[i] + 1) * fontSize > canvas.height && Math.random() > 0.95) {
                drops[i] = 0;
                activeNames[i] = Math.floor(Math.random() * djs.length);
            } else {
                drops[i]++;
            }
        }
    }

    // Shpejtësia bazë 50ms, por e ngadalësuar nga kushti frameCount
    setInterval(draw, 50);
</script>

</body>
</html>
