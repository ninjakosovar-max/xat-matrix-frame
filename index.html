<!DOCTYPE html>
<html lang="sq">
<head>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; }
        #matrix { display: block; background: transparent; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d', { alpha: true });

    canvas.height = window.innerHeight;
    canvas.width = 300; 

    const fontSize = 20;
    const columns = 1; 
    const drops = Array(columns).fill(1);
    
    const djs = [
        "DJ QUEEN",
        "DJ ANONYMOUS",
        "DJ TRIMRESHA",
        "DJ VITO",
        "DJ LANDI",
        "DJ EMANUEL",
        "DJ BESI"
    ];

    function draw() {
        // Sfondi plotësisht transparent - pa mbulim
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#0F0';
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < drops.length; i++) {
            const name = djs[Math.floor(Math.random() * djs.length)];
            
            const x = 10;
            
            ctx.fillText(name, x, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.95) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    // Shpejtësia është vendosur në 300ms për një lëvizje shumë më të ngadaltë
    setInterval(draw, 300);
</script>

</body>
</html>
