<!DOCTYPE html>
<html lang="sq">
<head>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: transparent; 
        }
        #matrix { 
            display: block; 
            background: transparent; 
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const fontSize = 20;
    const columns = 6;
    const columnWidth = 40;
    const drops = Array(columns).fill(0);
    
    let frameCount = 0;
    
    const djs = [
        "DJ QUEEN", "DJ ANONYMOUS", "DJ TRIMRESHA", 
        "DJ VITO", "DJ LANDI", "DJ EMANUEL", "DJ BESI"
    ];

    const activeNames = Array(columns).fill(0).map(() => Math.floor(Math.random() * djs.length));

    function draw() {
        // Sfondi plotesisht transparent - vetem pastrim minimal
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold ' + fontSize + 'px monospace';

        // Ngadalësim i mëtejshëm - ndryshon çdo 5 frame
        frameCount++;
        if (frameCount % 5 !== 0) return;

        for (let i = 0; i < columns; i++) {
            const name = djs[activeNames[i]];
            const char = name.charAt(drops[i] % name.length);
            
            // Pozicioni në anën e majt (6 kolona të vogla)
            const xPos = i * columnWidth + 10;
            const yPos = (drops[i] + 1) * fontSize;
            
            ctx.fillText(char, xPos, yPos);

            // Kur arrin në fund, rifillo
            if (yPos > canvas.height) {
                drops[i] = 0;
                activeNames[i] = Math.floor(Math.random() * djs.length);
            } else {
                drops[i]++;
            }
        }
    }

    // Intervali më i gjatë për shpejtësi më të ngadaltë
    setInterval(draw, 100);

    window.addEventListener('resize', () => {
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
    });
</script>

</body>
</html>
