<!DOCTYPE html>
<html lang="sq">
<head>
    <style>
        /* Sfondi i faqes mund të jetë çfarëdo ngjyre ose imazhi */
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* Canvas transparent */
        #matrix { display: block; background: transparent; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    canvas.height = window.innerHeight;
    canvas.width = 400; 

    const fontSize = 16;
    const columns = 8; 
    const drops = Array(columns).fill(1);
    
    const text = "SHIJO MUZIKËN, SHIJO DIZAJNIN E MOS KOPJO";

    function draw() {
        // Kjo linjë krijon efektin e zbehjes (trail)
        // E kemi bërë që të jetë transparente në vend të së zezës
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#0F0';
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < drops.length; i++) {
            const char = text.charAt(Math.floor(Math.random() * text.length));
            ctx.fillText(char, i * fontSize * 3, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    setInterval(draw, 60);
</script>

</body>
</html>
