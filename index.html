<!DOCTYPE html>
<html lang="sq">
<head>
    <style>
        /* Sigurohemi që canvas të mos bllokojë klikimet në chat ose butona */
        #matrix {
            position: fixed; /* Qëndron fiksuar lart majtas */
            top: 0;
            left: 0;
            z-index: 9999; /* Siguron që të jetë gjithmonë sipër */
            pointer-events: none; /* Lejon klikimin e gjërave që ndodhen pas shkronjave */
            background: transparent;
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    // Caktojmë përmasat e faqes
    canvas.height = window.innerHeight;
    canvas.width = 400; // E mbajmë vetëm në anën e majtë

    const fontSize = 16;
    const columns = 8; 
    const drops = Array(columns).fill(1);
    const text = "SHIJO MUZIKËN, SHIJO DIZAJNIN E MOS KOPJO";

    function draw() {
        // Efekti i rrjedhjes (Trail)
        // Nëse vë re që po të nxin sfondin, ndrysho '0.05' në '0.02'
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#0F0';
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < drops.length; i++) {
            const char = text.charAt(Math.floor(Math.random() * text.length));
            ctx.fillText(char, i * fontSize * 3, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }
    setInterval(draw, 60);
</script>

</body>
</html>
