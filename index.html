<!DOCTYPE html>
<html lang="sq">
<head>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000;
            font-family: monospace;
        }
        #matrix { 
            display: block; 
            background: #000;
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const fontSize = 20;
    
    const djs = [
        "DJ QUEEN",
        "DJ ANONYMOUS",
        "DJ TRIMRESHA",
        "DJ VITO",
        "DJ LANDI",
        "DJ EMANUEL",
        "DJ BESI"
    ];

    // Krijo një kolon për secilin DJ
    const columns = djs.map((dj, index) => ({
        name: dj,
        x: (index + 1) * (canvas.width / (djs.length + 1)),
        y: Math.random() * canvas.height,
        speed: Math.random() * 2 + 1,
        characters: dj.split(''),
        charIndex: 0
    }));

    function draw() {
        // Sfondi i zi me efekt trail
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = fontSize + 'px monospace';
        ctx.fillStyle = '#0F0';

        columns.forEach(col => {
            // Merr karakterin aktual
            const char = col.characters[col.charIndex];
            
            // Vizato karakterin
            ctx.fillText(char, col.x, col.y);

            // Lëvizja vertikale
            col.y += col.speed;

            // Kalim në karakterin e ardhshëm
            col.charIndex = (col.charIndex + 1) % col.characters.length;

            // Kthehu në fillim kur arrin në fund
            if (col.y > canvas.height) {
                col.y = 0;
                col.charIndex = 0;
            }
        });
    }

    // Redho çdo 50ms për animacion të qetë
    setInterval(draw, 50);

    // Përditëso canvas kur ndryshon madhësia e dritares
    window.addEventListener('resize', () => {
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
    });
</script>

</body>
</html>
